<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - KMUTNB Issue Tracker</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-lg shadow-md overflow-hidden border border-gray-200">
        <!-- Header -->
        <div class="bg-blue-600 px-6 py-4 text-center">
            <h2 class="text-2xl font-bold text-white tracking-tight">KMUTNB <span class="text-blue-200">ISSUE</span>
            </h2>
            <p class="text-blue-100 mt-1 text-sm">Staff Authentication</p>
        </div>

        <!-- Form Container -->
        <div class="px-6 py-8">
            {% if form.errors %}
            <div class="bg-red-50 border-l-4 border-red-500 p-4 mb-6 rounded-md">
                <div class="flex items-center">
                    <i class="fas fa-exclamation-circle text-red-500 mr-2"></i>
                    <p class="text-sm text-red-700">
                        Your username and password didn't match. Please try again.
                    </p>
                </div>
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}" class="space-y-6">
                {% csrf_token %}

                <div>
                    <label for="{{ form.username.id_for_label }}"
                        class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="text" name="{{ form.username.name }}" id="{{ form.username.id_for_label }}"
                            required
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                            placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <label for="{{ form.password.id_for_label }}"
                        class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" name="{{ form.password.name }}" id="{{ form.password.id_for_label }}"
                            required
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                            placeholder="••••••••">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        Sign in <i class="fas fa-arrow-right ml-2 text-xs"></i>
                    </button>
                </div>
                <!-- Need next redirect for django auth views to route cleanly -->
                <input type="hidden" name="next" value="{{ next }}">
            </form>

            <div class="mt-6 text-center">
                <a href="/" class="text-sm text-gray-500 hover:text-blue-600 transition-colors">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

</body>

</html>
